name: CI

# 웹앱(루트 Next.js)과 스크래퍼(scraper/, 독립 패키지)를 분리 게이트.
# 배포(Vercel/Railway) 워크플로는 시크릿 도착 후 별도 추가.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# 같은 ref 의 이전 실행은 취소(중복 빌드 방지).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  web:
    name: web — lint · tsc · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npx tsc --noEmit
      - name: Test
        run: npx vitest run --passWithNoTests
      - name: Build
        # NEXT_PUBLIC_* 는 빌드타임 인라인 → 더미 값 주입(시크릿 아님). 실 배포는 Vercel.
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_SITE_URL: https://example.com
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role

  scraper:
    name: scraper — tsc
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: scraper
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: scraper/package-lock.json
      # --ignore-scripts: postinstall(playwright 브라우저 다운로드) 스킵 — CI 는 타입체크만.
      - run: npm ci --ignore-scripts
      - name: Typecheck
        run: npx tsc --noEmit
